<div class="login-container">
  <div class="login-box">

    <h2>{{ isSignUp ? 'Create Account' : 'Welcome Back' }}</h2>
    <p class="subtitle">{{ isSignUp ? 'Sign up to manage your todos' : 'Login to your todo app' }}</p>

    <!-- Email -->
    <div class="input-group">
      <label>Email</label>
      <input
        type="email"
        placeholder="Enter your email"
        [value]="email"
        (input)="email = $any($event.target).value" />
    </div>

    <!-- Password -->
    <div class="input-group">
      <label>Password</label>
      <input
        type="password"
        placeholder="Enter your password"
        [value]="password"
        (input)="password = $any($event.target).value" />
    </div>

    <!-- Remember Me -->
    @if(!isSignUp){
      <div class="remember-me">
        <input
          type="checkbox"
          id="rememberMe"
          [checked]="rememberMe"
          (change)="rememberMe = $any($event.target).checked" />
        <label for="rememberMe">Remember Me</label>
      </div>
    }

    <!-- Error Message -->
    @if(errorMessage){
      <p class="error">⚠️ {{ errorMessage }}</p>
    }

    <!-- Button -->
    <button class="login-btn" (click)="isSignUp ? signUp() : login()">
      {{ isSignUp ? 'Sign Up' : 'Login' }}
    </button>

    <!-- Toggle -->
    <p class="toggle">
      {{ isSignUp ? 'Already have an account?' : "Don't have an account?" }}
      <span (click)="toggleMode()">
        {{ isSignUp ? 'Login' : 'Sign Up' }}
      </span>
    </p>

  </div>
</div>
